# golangci-lint configuration
# Comprehensive linting for Flowlyt

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration
  skip-dirs:
    - vendor
    - test/testdata
    - examples
  modules-download-mode: readonly

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    # Enabled by default
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code

    # Additional recommended linters
    - gofmt         # Check code formatting
    - goimports     # Check import formatting
    - misspell      # Check for misspelled English words
    - revive        # Golint replacement
    - gosec         # Security checker
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Reports unused function parameters
    - gocritic      # Comprehensive Go code checker
    - gocyclo       # Cyclomatic complexity
    - dupl          # Code clone detection
    - goconst       # Repeated strings that could be constants
    - exportloopref # Check for loop variable capture
    - nilerr        # Check for nil error return
    - nolintlint    # Check nolint directives
    - prealloc      # Find slice declarations that could be preallocated
    - predeclared   # Check for shadowing of predeclared identifiers
    - whitespace    # Check for unnecessary whitespace

  disable:
    - funlen        # Too strict for some valid long functions
    - gocognit      # Similar to gocyclo
    - lll           # Line length - handled by gofmt
    - godot         # Too strict for comments
    - wsl           # Whitespace linting too strict

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (*github.com/fatih/color.Color).Printf
      - (*github.com/fatih/color.Color).Println

  govet:
    enable-all: true
    disable:
      - shadow  # Too many false positives

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 100

  goconst:
    min-len: 3
    min-occurrences: 3
    ignore-tests: true

  misspell:
    locale: US

  unparam:
    check-exported: false

  gosec:
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)
      - G304  # File path from variable (common in our use case)
    severity: medium
    confidence: medium

  revive:
    rules:
      - name: exported
        disabled: false
        arguments:
          - "checkPrivateReceivers"
      - name: var-naming
        disabled: false
        arguments:
          - ["ID", "URL", "API", "CI", "CD", "AST", "AI", "OSV", "SARIF", "YAML", "JSON"]
      - name: indent-error-flow
        disabled: false
      - name: errorf
        disabled: false
      - name: error-naming
        disabled: false
      - name: error-strings
        disabled: false
      - name: receiver-naming
        disabled: false
      - name: increment-decrement
        disabled: false
      - name: error-return
        disabled: false
      - name: unexported-return
        disabled: false
      - name: time-naming
        disabled: false
      - name: context-keys-type
        disabled: false
      - name: context-as-argument
        disabled: false

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
    disabled-checks:
      - unnamedResult
      - whyNoLint
      - hugeParam  # Too strict

  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/harekrishnarai/flowlyt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

  exclude-rules:
    # Exclude test files from certain linters
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - errcheck

    # Exclude generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all

    # Exclude vendor
    - path: vendor/
      linters:
        - all

    # Allow TODO comments (we track them separately)
    - linters:
        - godox
      text: "TODO"

    # Allow long lines in some cases
    - source: "^//go:generate "
      linters:
        - lll

  exclude-use-default: false

  exclude:
    # Ignore error checks in defer statements
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*print(f|ln)?|os\\.(Un)?Setenv). is not checked"

    # Ignore some gosec warnings that are false positives
    - "G304: Potential file inclusion via variable"
    - "G306: Expect WriteFile permissions to be 0600 or less"

severity:
  default-severity: warning
  rules:
    - linters:
        - gosec
      severity: error
    - linters:
        - errcheck
      severity: error
