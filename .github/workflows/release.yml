name: Release

on:
  push:
    tags:
      - 'v*'

# Minimal permissions at workflow level
permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write  # Needed for creating releases
      id-token: write  # For cosign signing
      attestations: write  # For provenance attestations

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Verify dependencies
        run: |
          go mod verify
          go mod download

      - name: Run tests before release
        run: go test -v ./pkg/config ./pkg/parser ./pkg/policies ./pkg/rules ./pkg/shell

      - name: Run full test suite
        run: go test ./... -v -race -timeout=5m

      - name: Build binaries
        id: build
        run: |
          # Build for multiple platforms with security flags
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="flowlyt-${os}-${arch}"

            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building ${output}..."
            GOOS=$os GOARCH=$arch go build \
              -trimpath \
              -ldflags="-s -w -X github.com/harekrishnarai/flowlyt/pkg/constants.AppVersion=${GITHUB_REF_NAME#v}" \
              -o "$output" \
              ./cmd/flowlyt
          done

          # Create checksums
          sha256sum flowlyt-* > checksums.txt

          # Display checksums
          echo "=== Checksums ==="
          cat checksums.txt

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign binaries with Cosign
        run: |
          for file in flowlyt-*; do
            if [ "$file" != "checksums.txt" ]; then
              echo "Signing ${file}..."
              cosign sign-blob --yes \
                --output-signature="${file}.sig" \
                --output-certificate="${file}.pem" \
                "${file}"
            fi
          done

      - name: Generate build provenance
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c # v1.4.3
        with:
          subject-path: 'flowlyt-*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: |
            flowlyt-linux-amd64
            flowlyt-linux-amd64.sig
            flowlyt-linux-amd64.pem
            flowlyt-linux-arm64
            flowlyt-linux-arm64.sig
            flowlyt-linux-arm64.pem
            flowlyt-darwin-amd64
            flowlyt-darwin-amd64.sig
            flowlyt-darwin-amd64.pem
            flowlyt-darwin-arm64
            flowlyt-darwin-arm64.sig
            flowlyt-darwin-arm64.pem
            flowlyt-windows-amd64.exe
            flowlyt-windows-amd64.exe.sig
            flowlyt-windows-amd64.exe.pem
            checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: harekrishnarai/homebrew-flowlyt
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set — skipping Homebrew formula publish."
            echo "To enable: create the '${TAP_REPO}' repo and add a HOMEBREW_TAP_TOKEN secret (PAT with contents:write on that repo)."
            exit 0
          fi
          version="${VERSION#v}"
          sha() { awk -v f="$1" '$2==f {print $1}' checksums.txt; }
          darwin_arm="$(sha flowlyt-darwin-arm64)"
          darwin_amd="$(sha flowlyt-darwin-amd64)"
          linux_arm="$(sha flowlyt-linux-arm64)"
          linux_amd="$(sha flowlyt-linux-amd64)"
          base="https://github.com/harekrishnarai/flowlyt/releases/download/${VERSION}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" tap-repo
          mkdir -p tap-repo/Formula
          cat > tap-repo/Formula/flowlyt.rb <<RUBY
          class Flowlyt < Formula
            desc "Multi-Platform CI/CD Security Analyzer"
            homepage "https://github.com/harekrishnarai/flowlyt"
            version "${version}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "${base}/flowlyt-darwin-arm64"
                sha256 "${darwin_arm}"
              end
              on_intel do
                url "${base}/flowlyt-darwin-amd64"
                sha256 "${darwin_amd}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/flowlyt-linux-arm64"
                sha256 "${linux_arm}"
              end
              on_intel do
                url "${base}/flowlyt-linux-amd64"
                sha256 "${linux_amd}"
              end
            end

            def install
              bin.install Dir["flowlyt-*"].first => "flowlyt"
            end

            test do
              assert_match "flowlyt version", shell_output("#{bin}/flowlyt --version")
            end
          end
          RUBY

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/flowlyt.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "flowlyt ${version}"
            git push
            echo "Published Homebrew formula for ${version} to ${TAP_REPO}."
          fi

      - name: Display release information
        run: |
          echo "✅ Release created successfully!"
          echo "Version: ${GITHUB_REF_NAME}"
          echo "All binaries signed with Cosign"
          echo "Checksums available in checksums.txt"
